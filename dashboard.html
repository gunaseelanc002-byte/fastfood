<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AB Fast Food | Order Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --rcb-red: #EC1C24;
    --rcb-gold: #FFD700;
    --rcb-dark: #0a0a0a;
    --rcb-black: #111111;
    --rcb-charcoal: #1a1a1a;
    --rcb-silver: #c0c0c0;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--rcb-dark);
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
  }
  .topbar {
    background: var(--rcb-black);
    border-bottom: 2px solid var(--rcb-red);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .topbar h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    letter-spacing: 2px;
    color: var(--rcb-gold);
  }
  .topbar h1 span { color: var(--rcb-red); }
  #logoutBtn {
    background: transparent;
    border: 1px solid var(--rcb-red);
    color: var(--rcb-red);
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Oswald', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 1px;
    display: none;
  }
  #logoutBtn:hover { background: var(--rcb-red); color: #fff; }

  /* LOGIN SCREEN */
  #loginScreen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 85vh;
    padding: 1.5rem;
  }
  .login-box {
    background: var(--rcb-charcoal);
    border: 2px solid var(--rcb-red);
    border-radius: 8px;
    padding: 2.2rem;
    max-width: 380px;
    width: 100%;
  }
  .login-box h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--rcb-gold);
    letter-spacing: 2px;
    margin-bottom: 1.5rem;
    text-align: center;
  }
  .login-box label {
    display: block;
    font-family: 'Oswald', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 1px;
    color: var(--rcb-silver);
    margin-bottom: 6px;
    margin-top: 1rem;
    text-transform: uppercase;
  }
  .login-box input {
    width: 100%;
    padding: 12px 14px;
    background: var(--rcb-black);
    border: 1px solid #333;
    border-radius: 4px;
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 1rem;
  }
  .login-box input:focus { outline: none; border-color: var(--rcb-red); }
  .login-box button {
    width: 100%;
    margin-top: 1.5rem;
    padding: 13px;
    background: var(--rcb-red);
    border: none;
    border-radius: 4px;
    color: #fff;
    font-family: 'Oswald', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.3s;
  }
  .login-box button:hover { background: #c0151c; }
  #loginError {
    color: var(--rcb-red);
    font-size: 0.85rem;
    margin-top: 0.8rem;
    text-align: center;
    display: none;
  }

  /* DASHBOARD */
  #dashboardScreen { display: none; padding: 1.5rem; max-width: 1100px; margin: 0 auto; }
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .stat-box {
    background: var(--rcb-charcoal);
    border: 1px solid rgba(236,28,36,0.3);
    border-radius: 6px;
    padding: 1rem 1.2rem;
    text-align: center;
  }
  .stat-box .num {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    color: var(--rcb-gold);
  }
  .stat-box .label {
    font-family: 'Oswald', sans-serif;
    font-size: 0.7rem;
    letter-spacing: 1px;
    color: var(--rcb-silver);
    text-transform: uppercase;
  }
  #ordersList { display: flex; flex-direction: column; gap: 1rem; }
  .order-card {
    background: var(--rcb-charcoal);
    border: 1px solid rgba(255,255,255,0.08);
    border-left: 4px solid var(--rcb-red);
    border-radius: 6px;
    padding: 1.2rem 1.4rem;
  }
  .order-card.completed { border-left-color: #2ecc71; opacity: 0.6; }
  .order-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    flex-wrap: wrap;
    gap: 0.6rem;
    margin-bottom: 0.8rem;
  }
  .order-id {
    font-family: 'Oswald', sans-serif;
    font-size: 0.85rem;
    color: var(--rcb-gold);
    letter-spacing: 1px;
  }
  .order-time { font-size: 0.78rem; color: #777; }
  .order-customer { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; letter-spacing: 1px; margin-bottom: 0.2rem; }
  .order-contact { font-size: 0.85rem; color: var(--rcb-silver); margin-bottom: 0.6rem; }
  .order-items-list { font-size: 0.9rem; color: #ddd; margin-bottom: 0.6rem; line-height: 1.5; }
  .order-total {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    color: var(--rcb-gold);
  }
  .order-actions { margin-top: 0.8rem; display: flex; gap: 0.7rem; flex-wrap: wrap; }
  .order-actions button {
    padding: 8px 16px;
    border-radius: 4px;
    border: 1px solid var(--rcb-red);
    background: transparent;
    color: var(--rcb-red);
    font-family: 'Oswald', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 1px;
    cursor: pointer;
    text-transform: uppercase;
  }
  .order-actions button:hover { background: var(--rcb-red); color: #fff; }
  .order-actions a.call-btn {
    padding: 8px 16px;
    border-radius: 4px;
    border: 1px solid var(--rcb-gold);
    color: var(--rcb-gold);
    font-family: 'Oswald', sans-serif;
    font-size: 0.75rem;
    letter-spacing: 1px;
    text-decoration: none;
    text-transform: uppercase;
  }
  .empty-state { text-align: center; padding: 3rem 1rem; color: #777; font-family: 'Oswald', sans-serif; letter-spacing: 1px; }
  @media (max-width: 600px) {
    .topbar h1 { font-size: 1.2rem; }
  }
</style>
</head>
<body>

<div class="topbar">
  <h1>AB <span>FAST FOOD</span> — Orders</h1>
  <button id="logoutBtn" onclick="handleLogout()">Logout</button>
</div>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <h2>🔐 Owner Login</h2>
    <label>Email</label>
    <input type="email" id="loginEmail" placeholder="you@email.com">
    <label>Password</label>
    <input type="password" id="loginPassword" placeholder="••••••••">
    <button onclick="handleLogin()">Login</button>
    <div id="loginError"></div>
  </div>
</div>

<!-- DASHBOARD SCREEN -->
<div id="dashboardScreen">
  <div class="stats-row">
    <div class="stat-box">
      <div class="num" id="statTotal">0</div>
      <div class="label">Total Orders</div>
    </div>
    <div class="stat-box">
      <div class="num" id="statPending">0</div>
      <div class="label">Pending</div>
    </div>
    <div class="stat-box">
      <div class="num" id="statToday">0</div>
      <div class="label">Today</div>
    </div>
    <div class="stat-box">
      <div class="num" id="statRevenue">₹0</div>
      <div class="label">Today's Sales</div>
    </div>
  </div>
  <div id="ordersList"></div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyC5UlYyA8LoUc_Ylk2WnqPeFJFVNvdvYYQ",
    authDomain: "fastfood-1e80a.firebaseapp.com",
    projectId: "fastfood-1e80a",
    storageBucket: "fastfood-1e80a.firebasestorage.app",
    messagingSenderId: "383020073104",
    appId: "1:383020073104:web:921a125b83f26cacb0d815"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const auth = firebase.auth();

  let unsubscribeOrders = null;

  function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errorBox = document.getElementById('loginError');
    errorBox.style.display = 'none';

    auth.signInWithEmailAndPassword(email, password)
      .catch((error) => {
        errorBox.textContent = 'Login failed: ' + error.message;
        errorBox.style.display = 'block';
      });
  }

  function handleLogout() {
    auth.signOut();
  }

  auth.onAuthStateChanged((user) => {
    if (user) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('dashboardScreen').style.display = 'block';
      document.getElementById('logoutBtn').style.display = 'inline-block';
      startListeningToOrders();
    } else {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('dashboardScreen').style.display = 'none';
      document.getElementById('logoutBtn').style.display = 'none';
      if (unsubscribeOrders) unsubscribeOrders();
    }
  });

  function startListeningToOrders() {
    unsubscribeOrders = db.collection('orders')
      .orderBy('placedAt', 'desc')
      .onSnapshot((snapshot) => {
        const orders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderOrders(orders);
        renderStats(orders);
      }, (error) => {
        console.error('Error fetching orders:', error);
      });
  }

  function renderStats(orders) {
    const today = new Date().toDateString();
    const todaysOrders = orders.filter(o => new Date(o.placedAt).toDateString() === today);
    const pending = orders.filter(o => o.status !== 'completed');
    const todaysRevenue = todaysOrders.reduce((sum, o) => sum + (o.total || 0), 0);

    document.getElementById('statTotal').textContent = orders.length;
    document.getElementById('statPending').textContent = pending.length;
    document.getElementById('statToday').textContent = todaysOrders.length;
    document.getElementById('statRevenue').textContent = '₹' + todaysRevenue;
  }

  function renderOrders(orders) {
    const container = document.getElementById('ordersList');
    if (orders.length === 0) {
      container.innerHTML = '<div class="empty-state">No orders yet. They\'ll show up here in real-time! 🏏</div>';
      return;
    }

    container.innerHTML = orders.map(order => {
      const itemsHtml = (order.items || []).map(i => `${i.name} x${i.qty} — ₹${i.price * i.qty}`).join('<br>');
      const timeStr = order.placedAt ? new Date(order.placedAt).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' }) : '—';
      const isCompleted = order.status === 'completed';
      const phone = order.customer?.phone || '';

      return `
        <div class="order-card ${isCompleted ? 'completed' : ''}">
          <div class="order-top">
            <span class="order-id">${order.id}</span>
            <span class="order-time">${timeStr}</span>
          </div>
          <div class="order-customer">${order.customer?.name || 'Unknown'}</div>
          <div class="order-contact">📞 ${phone} &nbsp; | &nbsp; 📍 ${order.customer?.address || 'Not provided'}</div>
          <div class="order-items-list">${itemsHtml}</div>
          <div class="order-total">Total: ₹${order.total}</div>
          <div class="order-actions">
            ${phone ? `<a class="call-btn" href="tel:${phone}">📞 Call</a>` : ''}
            ${!isCompleted ? `<button onclick="markCompleted('${order.id}')">Mark Completed ✓</button>` : '<span style="color:#2ecc71;font-family:Oswald,sans-serif;font-size:0.8rem;letter-spacing:1px;">✓ COMPLETED</span>'}
          </div>
        </div>
      `;
    }).join('');
  }

  function markCompleted(orderId) {
    db.collection('orders').doc(orderId).update({ status: 'completed' })
      .catch(err => console.error('Error updating order:', err));
  }
</script>
</body>
</html>
